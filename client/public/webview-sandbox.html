<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}</style>
</head>
<body>
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'INJECT_HTML') {
    document.open();
    document.write(e.data.html);
    document.close();
  }
});
window.parent.postMessage({ type: 'SANDBOX_READY' }, '*');
</script>
</body>
</html>
